name: Keep Supabase Alive

on:
  schedule:
    # Supabase pausa projetos (free) após ~7 dias sem tráfego.
    # Rodar a cada 6 dias é suficiente; ajuste se preferir mais frequência.
    - cron: "0 0 */6 * *" # a cada 6 dias
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing SUPABASE_URL secret."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_SERVICE_ROLE_KEY (recommended) or SUPABASE_ANON_KEY secret."
            exit 1
          fi

          # Goal: generate traffic so the free project doesn't pause.
          # The ping must be "robust": some projects don't have a `profiles` table,
          # and RLS can block anon SELECT. We'll treat any HTTP response as success
          # (even 401/404), because the request still generates traffic.

          # Prefer service role for reliability (RLS can block anon SELECT).
          key="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_ANON_KEY}}"

          # 1) Stable health endpoint (doesn't require auth). Good "is it up?" check.
          health_url="${SUPABASE_URL%/}/auth/v1/health"
          echo "Pinging health: ${health_url}"
          curl -sS \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 20 \
            "${health_url}" >/dev/null

          # 2) PostgREST ping (overrideable), but don't fail on non-2xx.
          # - SUPABASE_PING_TABLE (default: profiles)
          # - SUPABASE_PING_SELECT (default: id)
          # - SUPABASE_PING_PATH (optional: full path override, ex "/rest/v1/xyz?select=*&limit=1")
          table="${SUPABASE_PING_TABLE:-profiles}"
          select_cols="${SUPABASE_PING_SELECT:-id}"
          ping_path_default="/rest/v1/${table}?select=${select_cols}&limit=1"
          ping_path="${SUPABASE_PING_PATH:-$ping_path_default}"
          ping_path="${ping_path#/}" # prevent double slashes
          rest_url="${SUPABASE_URL%/}/${ping_path}"
          echo "Pinging rest: ${rest_url}"

          http_code="$(
            curl -sS -o /dev/null -w "%{http_code}" \
              --retry 3 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 20 \
              -H "apikey: ${key}" \
              -H "Authorization: Bearer ${key}" \
              -H "Accept: application/json" \
              "${rest_url}" || true
          )"

          if [ -z "${http_code}" ] || [ "${http_code}" = "000" ]; then
            echo "REST ping failed to get an HTTP response."
            exit 1
          fi

          if [ "${http_code}" -ge 400 ]; then
            echo "REST ping returned HTTP ${http_code} (non-fatal; still counted as traffic)."
          else
            echo "REST ping returned HTTP ${http_code}."
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PING_PATH: ${{ secrets.SUPABASE_PING_PATH }}
          SUPABASE_PING_TABLE: ${{ vars.SUPABASE_PING_TABLE }}
          SUPABASE_PING_SELECT: ${{ vars.SUPABASE_PING_SELECT }}
